# Render Blueprint — https://render.com/docs/blueprint-spec
# In the dashboard you can also configure manually using the same values.

databases:
  - name: vertexshop-db
    plan: free
    databaseName: vertexshop
    user: vertexshop

services:
  - type: web
    name: vertexshop
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    dockerCommand: /start.sh
    healthCheckPath: /up
    autoDeployTrigger: commit
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_NAME
        value: VertexShop
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: vertexshop-db
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: vertexshop-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false
      - key: APP_URL
        sync: false
